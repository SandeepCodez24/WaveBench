events {
    worker_connections 1024;
}

http {
    # Gateway WebSocket server (Java, port 8080)
    upstream gateway_ws {
        server 127.0.0.1:8080;
    }

    # Gateway REST API server (Java, port 8081)
    upstream gateway_http {
        server 127.0.0.1:8081;
    }

    server {
        # Render expects the container to listen on $PORT (10000 by default)
        listen 10000;

        # ── WebSocket endpoint ─────────────────────────────────────────
        # Browser connects via: wss://your-service.onrender.com/ws
        location /ws {
            proxy_pass http://gateway_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Keep WebSocket connections alive for simulation duration
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── REST API endpoint ──────────────────────────────────────────
        # Frontend calls: https://your-service.onrender.com/api/*
        location /api/ {
            proxy_pass http://gateway_http;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check for Render
        location /health {
            proxy_pass http://gateway_http/api/health;
        }
    }
}
